<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 15px;
        }

        .navbar {
            display: flex;
            gap: 15px;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: #aaa;
            font-size: 14px;
            padding: 8px 15px;
            transition: color 0.2s ease;
            border-bottom: 3px solid transparent;
            display: inline-block;
        }

        .nav-link:hover {
            color: #fff;
        }

        .nav-link.active {
            color: #ff0000;
            border-bottom-color: #ff0000;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f1f1;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row input {
            flex: 1 1 320px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #121212;
            color: #fff;
            font-size: 15px;
        }

        .input-row button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: #ff0000;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
        }

        .video-player {
            width: 100%;
            max-width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        .video-player video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        #videoStatus {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .section-title {
                font-size: 20px;
            }

            .input-row input,
            .input-row button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">▶ VideoHub</div>
        <div class="navbar">
            <a href="index.html" class="nav-link">Tab 1</a>
            <a href="tab2.html" class="nav-link">Tab 2</a>
            <a href="tab3.html" class="nav-link">Tab 3</a>
            <a href="custom.html" class="nav-link active">Custom</a>
        </div>
    </div>

    <div class="container">
        <div class="video-player">
            <video controls src="https://www.xozilla.xxx/get_file/14/a9baa48b063bb21880621680bb9f3c00/215000/215888/215888.mp4/?rnd=1778388205025" class="fp-engine" preload="metadata" x-webkit-airplay="allow" webkit-playsinline="true" playsinline="true"></video>
        </div>
        <div class="video-player">
            <video id="customVideo" controls>
                <source id="customVideoSource" src="https://www.xozilla.xxx/get_file/7/359f7a2e2d51053adcd1f3ffdf6b826c/815000/815667/815667.mp4/?rnd=1778391481105" type="video/mp4" />
            </video>
        </div>
        <div id="videoStatus">Video loaded from the direct URL in the code.</div>
    </div>

    <script>
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadVideoBtn = document.getElementById('loadVideoBtn');
        const customVideo = document.getElementById('customVideo');
        const customVideoSource = document.getElementById('customVideoSource');
        const videoStatus = document.getElementById('videoStatus');

        function setStatus(message, isError = false) {
            videoStatus.textContent = message;
            videoStatus.style.color = isError ? '#ff5555' : '#aaa';
        }

        function loadVideo() {
            const url = videoUrlInput.value.trim();
            if (!url) {
                setStatus('Please enter a valid video URL.', true);
                return;
            }

            // Use CORS proxy for live deployments
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            const finalUrl = window.location.hostname.includes('github.dev') ? url : proxyUrl;

            customVideo.pause();
            customVideoSource.src = finalUrl;
            customVideo.load();
            customVideo.removeAttribute('loop');
            setStatus('Video loaded. Use the controls to play it.');
        }

        loadVideoBtn.addEventListener('click', loadVideo);
        videoUrlInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                loadVideo();
            }
        });
    </script>
</body>
</html>
