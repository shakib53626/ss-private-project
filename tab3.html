<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Home - Tab 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 15px;
        }

        .navbar {
            display: flex;
            gap: 15px;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: #aaa;
            font-size: 14px;
            padding: 8px 15px;
            transition: color 0.2s ease;
            border-bottom: 3px solid transparent;
            display: inline-block;
        }

        .nav-link:hover {
            color: #fff;
        }

        .nav-link.active {
            color: #ff0000;
            border-bottom-color: #ff0000;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            color: #f1f1f1;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .video-card {
            cursor: pointer;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #000;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-info {
            padding: 0 5px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 8px;
            color: #f1f1f1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 12px;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .video-channel {
            color: #aaa;
        }

        .video-stats {
            display: flex;
            gap: 8px;
        }

        .video-stats span {
            color: #aaa;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }

            .video-title {
                font-size: 12px;
            }

            .video-meta {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">▶ VideoHub</div>
        <div class="navbar">
            <a href="index.html" class="nav-link">Tab 1</a>
            <a href="tab2.html" class="nav-link">Tab 2</a>
            <a href="tab3.html" class="nav-link active">Tab 3</a>
        </div>
    </div>

    <div class="container">
        <div class="section-title">Latest Videos</div>
        <div class="video-grid" id="videoGrid"></div>
        <div id="loadingIndicator" style="display: none; text-align: center; padding: 20px;">
            <div style="color: #aaa;">Loading more videos...</div>
        </div>
    </div>

    <div id="fullscreenModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px;">
        <button id="closeBtn" style="position: absolute; top: 20px; right: 20px; background: #ff0000; border: none; color: white; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; z-index: 1001;">Close</button>
        <button id="prevBtn" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(255,0,0,0.7); border: none; color: white; padding: 15px 20px; font-size: 20px; cursor: pointer; border-radius: 5px; z-index: 1001;">❮</button>
        <button id="nextBtn" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(255,0,0,0.7); border: none; color: white; padding: 15px 20px; font-size: 20px; cursor: pointer; border-radius: 5px; z-index: 1001;">❯</button>
        <div style="display: flex; justify-content: center; align-items: center; height: 100%; width: 100%;">
            <video id="fullscreenVideo" controls style="max-width: 90%; max-height: 90%; border-radius: 10px;">
            </video>
        </div>
    </div>

    <script>
        const videoTitles = [
            'Web Development Tutorial - Build Amazing Sites',
            '10 JavaScript Tips You Didn\'t Know',
            'React Hooks Explained in 10 Minutes',
            'CSS Grid Layout Complete Guide',
            'Node.js Performance Optimization',
            'TypeScript Best Practices 2025',
            'HTML5 Canvas Advanced Techniques',
            'REST API Design Patterns',
            'Database Optimization Secrets',
            'Progressive Web Apps Tutorial',
            'Docker & Kubernetes Basics',
            'GraphQL vs REST APIs Compared'
        ];

        const channels = ['Tech Academy', 'Code Masters', 'Dev Channel', 'Web Wizards', 'JavaScript Pro'];
        const emojis = ['🎬', '📺', '🎥', '📹', '🎞️', '📽️', '🎭', '🎪', '🎨', '🎯', '🚀', '⚡'];

        const VIDEOS_PER_BATCH = 20;
        const TOTAL_VIDEOS = 506;
        const MAX_VIDEOS_TO_LOAD = 100;
        let currentIndex = 0;
        let isLoading = false;

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function createVideoCard(index) {
            const title = videoTitles[index % videoTitles.length];
            const channel = getRandomElement(channels);
            const views = Math.floor(Math.random() * 1000000) + 1000;
            const days = Math.floor(Math.random() * 30) + 1;
            const emoji = getRandomElement(emojis);
            const videoUrl = `https://cdn.ghopghop.com/${index + 1}.mp4`;

            return `
                <div class="video-card">
                    <div class="video-player">
                        <video id="video-${index}" controls>
                            <source src="${videoUrl}" type="video/mp4">
                        </video>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${title}</div>
                        <div class="video-meta">
                            <div class="video-channel">${channel}</div>
                            <div class="video-stats">
                                <span>${views.toLocaleString()} views</span>
                                <span>•</span>
                                <span>${days} days ago</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        let hasVideoError = false;
        let currentFullscreenIndex = 0;

        function openFullscreen(index) {
            currentFullscreenIndex = index;
            const modal = document.getElementById('fullscreenModal');
            const video = document.getElementById('fullscreenVideo');
            const videoUrl = `https://cdn.upvdo.xyz/${index + 1}.mp4`;

            video.src = videoUrl;
            modal.style.display = 'flex';
            video.play();
        }

        function closeFullscreen() {
            const modal = document.getElementById('fullscreenModal');
            const video = document.getElementById('fullscreenVideo');
            video.pause();
            modal.style.display = 'none';
        }

        function showNextVideo() {
            if (currentFullscreenIndex < MAX_VIDEOS_TO_LOAD - 1) {
                openFullscreen(currentFullscreenIndex + 1);
            }
        }

        function showPrevVideo() {
            if (currentFullscreenIndex > 0) {
                openFullscreen(currentFullscreenIndex - 1);
            }
        }

        function loadMoreVideos() {
            if (isLoading || currentIndex >= MAX_VIDEOS_TO_LOAD || hasVideoError) return;

            isLoading = true;
            const loadingIndicator = document.getElementById('loadingIndicator');
            loadingIndicator.style.display = 'block';

            // Simulate network delay
            setTimeout(() => {
                const grid = document.getElementById('videoGrid');
                const batch = Math.min(VIDEOS_PER_BATCH, MAX_VIDEOS_TO_LOAD - currentIndex);
                let html = '';

                for (let i = 0; i < batch; i++) {
                    html += createVideoCard(currentIndex + i);
                }

                grid.innerHTML += html;
                currentIndex += batch;

                // Check for video load errors
                const videos = grid.querySelectorAll('video');
                videos.forEach(video => {
                    video.addEventListener('error', () => {
                        hasVideoError = true;
                        loadingIndicator.textContent = 'No more videos available';
                        loadingIndicator.style.color = '#ff0000';
                        isLoading = true;
                    });
                });

                isLoading = false;
                loadingIndicator.style.display = 'none';

                if (currentIndex >= MAX_VIDEOS_TO_LOAD) {
                    loadingIndicator.style.display = 'none';
                }
            }, 300);
        }

        function handleScroll() {
            const grid = document.getElementById('videoGrid');

            const scrollPosition = window.scrollY + window.innerHeight;
            const gridBottom = grid.offsetTop + grid.offsetHeight;

            if (scrollPosition > gridBottom - 500) {
                loadMoreVideos();
            }
        }

        loadMoreVideos();

        let scrollTimeout;
        window.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(handleScroll, 100);
        });

        document.getElementById('closeBtn').addEventListener('click', closeFullscreen);
        document.getElementById('nextBtn').addEventListener('click', showNextVideo);
        document.getElementById('prevBtn').addEventListener('click', showPrevVideo);

        document.getElementById('fullscreenModal').addEventListener('click', (e) => {
            if (e.target.id === 'fullscreenModal') {
                closeFullscreen();
            }
        });

        const observer = new MutationObserver(() => {
            const videoCards = document.querySelectorAll('.video-card');
            videoCards.forEach((card, index) => {
                if (!card.hasListener) {
                    card.addEventListener('click', () => openFullscreen(index));
                    card.hasListener = true;
                }
            });
        });

        observer.observe(document.getElementById('videoGrid'), { childList: true });
    </script>
</body>
</html>
