<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 15px;
        }

        .navbar {
            display: flex;
            gap: 15px;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
        }

        .nav-link {
            text-decoration: none;
            color: #aaa;
            font-size: 14px;
            padding: 8px 15px;
            transition: color 0.2s ease;
            border-bottom: 3px solid transparent;
            display: inline-block;
        }

        .nav-link:hover {
            color: #fff;
        }

        .nav-link.active {
            color: #ff0000;
            border-bottom-color: #ff0000;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f1f1;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row input {
            flex: 1 1 320px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #121212;
            color: #fff;
            font-size: 15px;
        }

        .input-row button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: #ff0000;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
        }

        .preset-button {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s ease, border-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0;
        }

        .preset-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .preset-list {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .preset-button:hover {
            background: #1b1b1b;
            border-color: #ff0000;
        }

        @media (max-width: 768px) {
            .preset-list {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 480px) {
            .preset-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .video-player {
            width: 100%;
            max-width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        .video-player video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        #videoStatus {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .section-title {
                font-size: 20px;
            }

            .input-row input,
            .input-row button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">▶ VideoHub</div>
        <div class="navbar">
            <a href="index.html" class="nav-link">Tab 1</a>
            <a href="tab2.html" class="nav-link">Tab 2</a>
            <a href="tab3.html" class="nav-link">Tab 3</a>

    <div class="container">

        function setStatus(message, isError = false) {
            videoStatus.textContent = message;
            videoStatus.style.color = isError ? '#ff5555' : '#aaa';
        }

        function updateSourceLink(url) {
            sourceLink.innerHTML = `Direct link: <a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#ff6666;">Open source URL</a>`;
        }

        function loadPresetVideo(url) {
            if (!url) {
                setStatus('Invalid preset URL.', true);
                return;
            }

            customVideo.pause();
            customVideoSource.src = url;
            customVideo.load();
            setStatus('Loaded preset video. Press play to start.');
            updateSourceLink(url);
        }

        function renderPresets() {
            presetList.innerHTML = presets.map((preset, index) => `
                <button class="preset-button" data-url="${preset.url}">
                    ${preset.img ? `<img src="${preset.img}" alt="${preset.title}" />` : preset.title}
                </button>
            `).join('');

            presetList.querySelectorAll('.preset-button').forEach(button => {
                button.addEventListener('click', () => loadPresetVideo(button.dataset.url));
            });
        }

        customVideo.addEventListener('error', () => {
            setStatus('Video failed to load. This server may block embedding or CORS.', true);
        });

        customVideo.addEventListener('loadedmetadata', () => {
            setStatus('Video is ready. Use the controls to play it.');
        });

        renderPresets();
    </script>
